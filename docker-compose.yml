
services:

  frontend:
    build: ./frontend
    container_name: safesight-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_ML_SERVICE_URL=http://localhost:8000
      - VITE_WS_URL=http://localhost:3000
    depends_on:
      - backend
      - ml-service
    networks:
      - safesight-network

  backend:
    build: ./backend
    container_name: safesight-backend
    ports:
      - "3000:5000"
    environment:
      - DATABASE_URL=postgresql://safesight:safesight@postgres:5432/safesight
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ML_SERVICE_URL=http://ml-service:8000
      - ML_WEBHOOK_KEY=safesight-ml-key
      - FRONTEND_URL=http://localhost:5173
      - SLACK_WEBHOOK_URL=
      - NOTIFY_EMAIL=
    depends_on:
      - postgres
      - redis
      - ml-service
    networks:
      - safesight-network

  ml-service:
    build: ./ml-service
    container_name: safesight-ml
    ports:
      - "8000:8000"
    networks:
      - safesight-network
    depends_on:
      - postgres
      - minio
    environment:
      DATABASE_URL: postgresql://safesight:safesight@postgres:5432/safesight
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_URL: http://localhost:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password123
      MINIO_BUCKET: safesight-ai
      BACKEND_URL: http://backend:5000
      ML_WEBHOOK_KEY: safesight-ml-key
    volumes:
      - ./data:/app/data

  postgres:
    image: postgres:15
    container_name: safesight-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: safesight
      POSTGRES_PASSWORD: safesight
      POSTGRES_DB: safesight
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - safesight-network

  redis:
    image: redis:7
    container_name: safesight-redis
    ports:
      - "6379:6379"
    networks:
      - safesight-network
  
  minio:
    image: minio/minio
    container_name: safesight-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - safesight-network

networks:
  safesight-network:

volumes:
  postgres-data:
  minio_data: