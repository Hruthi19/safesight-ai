
services:

  frontend:
    build: ./frontend
    container_name: safesight-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:3000
    depends_on:
      - backend
    networks:
      - safesight-network

  backend:
    build: ./backend
    container_name: safesight-backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://safesight:safesight@postgres:5432/safesight
      - REDIS_HOST=redis
      - ML_SERVICE_URL=http://ml-service:8000
    depends_on:
      - postgres
      - redis
      - ml-service
    networks:
      - safesight-network

  ml-service:
    build: ./ml-service
    container_name: safesight-ml
    ports:
      - "8000:8000"
    networks:
      - safesight-network

  postgres:
    image: postgres:15
    container_name: safesight-postgres
    restart: always
    environment:
      POSTGRES_USER: safesight
      POSTGRES_PASSWORD: safesight
      POSTGRES_DB: safesight
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - safesight-network

  redis:
    image: redis:7
    container_name: safesight-redis
    ports:
      - "6379:6379"
    networks:
      - safesight-network

networks:
  safesight-network:

volumes:
  postgres-data: